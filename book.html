<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Session - MindEase Health</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="navbar">
        <a href="/" class="logo">MindEase Health</a>
        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/mood">Mood Check</a>
            <a href="/history">History</a>
            <a href="/support">Support</a>
            <a href="/notes">Wellness Notes</a>
        </div>
    </div>

    <div class="container">
        <div class="hero-box">
            <h1>Book a Support Session</h1>
            <p>Request a wellbeing or guidance session through the platform</p>

            <form class="login-form" method="POST">
                <input type="text" name="full_name" placeholder="Full name" required>
                <input type="email" name="email" placeholder="Email address" required>

                <select name="session_type" required>
                    <option value="">Select session type</option>
                    <option value="Stress Support">Stress Support</option>
                    <option value="Academic Pressure">Academic Pressure</option>
                    <option value="Emotional Wellbeing">Emotional Wellbeing</option>
                    <option value="General Guidance">General Guidance</option>
                </select>

                <input type="date" name="preferred_date" required>
                <textarea name="notes" rows="5" placeholder="Briefly describe what support you would like"></textarea>

                <button type="submit" class="btn">Submit Booking</button>
            </form>

            {% if success %}
                <div class="success-box">
                    <h2>Booking Submitted</h2>
                    <p>Your support session request has been saved successfully.</p>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
