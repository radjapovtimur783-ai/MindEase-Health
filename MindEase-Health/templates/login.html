<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MindEase Health</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="navbar">
        <a href="/" class="logo">MindEase Health</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/support">Support</a>
            <a href="/book">Book Session</a>
        </div>
    </div>

    <div class="container">
        <div class="hero-box">
            <h1>User Login</h1>
            <p>Access the MindEase Health student support dashboard</p>

            <form class="login-form" action="/dashboard">
                <input type="email" placeholder="University email address" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn">Enter Dashboard</button>
            </form>
        </div>
    </div>
</body>
</html>
